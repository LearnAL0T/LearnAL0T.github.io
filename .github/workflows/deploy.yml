name: Deploy Hugo to GitHub Pages

on:
  push:
    branches: [ main ]  # 触发分支（默认可能是 main 或 master）

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true  # 如果使用主题作为 Git 子模块，需启用

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'  # 自动获取最新版 Hugo
          extended: true          # 使用扩展版（支持 Sass/SCSS）

      - name: Build
        run: hugo --minify  # 生成静态文件到 public/ 目录

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}  # 自动使用 GitHub 令牌
          publish_dir: ./public                      # 推送 public/ 目录内容
          destination_dir: .                         # 部署到仓库根目录（而非 gh-pages 分支）